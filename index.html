<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin Học 9 - Chinh Phục Công Nghệ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background: #020617; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .glass { background: rgba(255, 255, 255, 0.98); border-radius: 32px; box-shadow: 0 0 50px rgba(59, 130, 246, 0.2); border: 4px solid #3b82f6; position: relative; z-index: 10; }
        
        /* Hiệu ứng Buff */
        .buff-card { transition: all 0.3s; cursor: pointer; border: 2px solid #f1f5f9; opacity: 0.4; filter: grayscale(1); }
        .buff-card.available { opacity: 1; filter: none; border-color: #3b82f6; background: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2); }
        .buff-card.active { animation: pulse-blue 1.5s infinite; background: #eff6ff; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        .achievement-toast { position: fixed; top: 20px; right: 20px; background: #1e293b; color: #fff; padding: 16px; border-radius: 20px; border-left: 6px solid #a855f7; z-index: 1000; transform: translateX(150%); transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .achievement-toast.show { transform: translateX(0); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <audio id="achievement-sound" src="Challenge_complete.mp3" preload="auto"></audio>

    <div id="achievement-toast" class="achievement-toast flex items-center gap-4">
        <div id="toast-icon" class="text-3xl">🏆</div>
        <div>
            <div class="text-xs font-bold text-purple-400 uppercase">Thành tựu mới!</div>
            <div id="achievement-name" class="font-black text-lg text-white">Tên Thành Tựu</div>
        </div>
    </div>

    <div id="game-container" class="glass w-full max-w-3xl p-6 md:p-8 mx-4">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-black text-blue-600 uppercase">Tin Học 9</h1>
                <p class="text-[10px] text-gray-400 font-mono italic">Thế giới kĩ thuật số</p>
            </div>
            <div class="text-right">
                <div class="text-3xl font-black text-emerald-600"><span id="total-score">0</span>đ</div>
                <div id="combo-display" class="text-xl font-bold text-orange-500 hidden">🔥 x0</div>
            </div>
        </div>

        <div id="start-screen" class="text-center py-10">
            <div class="text-8xl mb-6">💻</div>
            <button onclick="startGame()" class="bg-blue-600 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-[0_8px_0_rgb(30,58,138)] active:translate-y-1 active:shadow-none transition-all">BẮT ĐẦU</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="grid grid-cols-4 sm:grid-cols-7 gap-2 mb-6">
                <div onclick="useBuff('skip')" id="buff-skip" class="buff-card p-2 rounded-xl text-center">
                    <div class="text-lg">⏭️</div>
                    <div class="text-[8px] font-bold uppercase">Bỏ qua</div>
                    <div class="text-[10px] text-blue-600 font-black">5đ</div>
                </div>
                <div onclick="useBuff('hint')" id="buff-hint" class="buff-card p-2 rounded-xl text-center">
                    <div class="text-lg">🌓</div>
                    <div class="text-[8px] font-bold uppercase">50/50</div>
                    <div class="text-[10px] text-blue-600 font-black">5đ</div>
                </div>
                <div onclick="useBuff('double')" id="buff-double" class="buff-card p-2 rounded-xl text-center">
                    <div class="text-lg">⚡</div>
                    <div class="text-[8px] font-bold uppercase">x2 Điểm</div>
                    <div class="text-[10px] text-blue-600 font-black">5đ</div>
                </div>
                <div onclick="useBuff('shield')" id="buff-shield" class="buff-card p-2 rounded-xl text-center">
                    <div class="text-lg">🛡️</div>
                    <div class="text-[8px] font-bold uppercase">Khiên</div>
                    <div class="text-[10px] text-blue-600 font-black">3đ</div>
                </div>
                <div onclick="useBuff('addTime')" id="buff-addTime" class="buff-card p-2 rounded-xl text-center">
                    <div class="text-lg">⏳</div>
                    <div class="text-[8px] font-bold uppercase">+5s</div>
                    <div class="text-[10px] text-blue-600 font-black">4đ</div>
                </div>
                <div onclick="useBuff('passivePts')" id="buff-passivePts" class="buff-card p-2 rounded-xl text-center">
                    <div class="text-lg">💎</div>
                    <div class="text-[8px] font-bold uppercase">Thụ Động</div>
                    <div class="text-[10px] text-blue-600 font-black">5đ</div>
                </div>
                <div onclick="useBuff('restoreCombo')" id="buff-restoreCombo" class="buff-card p-2 rounded-xl text-center">
                    <div class="text-lg">🔥</div>
                    <div class="text-[8px] font-bold uppercase">Hồi Chuỗi</div>
                    <div class="text-[10px] text-blue-600 font-black">5đ</div>
                </div>
            </div>

            <div id="question-area">
                <h3 id="question-text" class="text-xl font-bold text-slate-800 mb-6 min-h-[60px]">...</h3>
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
            <div id="feedback" class="hidden p-4 mt-6 rounded-2xl text-center font-black text-white"></div>
        </div>
    </div>

    <script>
        const QUESTIONS = [
            { q: "Hệ điều hành là gì?", options: ["Phần cứng", "Phần mềm ứng dụng", "Phần mềm hệ thống", "Trình duyệt"], correct: 2 },
            { q: "Windows 10 là gì?", options: ["Trình duyệt", "Hệ điều hành", "Phần cứng", "Ứng dụng chat"], correct: 1 },
            { q: "Hệ điều hành phổ biến trên di động?", options: ["Windows", "Linux", "Android", "DOS"], correct: 2 },
            { q: "Zalo là loại phần mềm gì?", options: ["Hệ điều hành", "Phần mềm ứng dụng", "Phần cứng", "Mã nguồn mở"], correct: 1 }
        ];

        let state = {
            currentQ: 0, score: 0, combo: 0, lastCombo: 0,
            canAnswer: true, isDouble: false, isShield: false,
            unlocked: new Set(JSON.parse(localStorage.getItem('tin9_final_ach') || '[]')),
            correctTotal: 0
        };

        const BUFF_PRICES = { skip: 5, hint: 5, double: 5, shield: 3, addTime: 4, passivePts: 5, restoreCombo: 5 };

        const ACHS = [
            { id: 'combo3', title: 'Khởi đầu tốt', icon: '🥉', condition: s => s.combo >= 3 },
            { id: 'combo5', title: 'Tay chơi ổn định', icon: '🥈', condition: s => s.combo >= 5 },
            { id: 'combo10', title: 'Chuỗi Hủy Diệt', icon: '🔥', condition: s => s.combo >= 10 },
            { id: 'combo15', title: 'Bất Khả Chiến Bại', icon: '⚡', condition: s => s.combo >= 15 },
            { id: 'combo20', title: 'Huyền Thoại Chuỗi', icon: '🌌', condition: s => s.combo >= 20 },
            { id: 'rookie', title: 'Tân binh mới nhú', icon: '🔰', condition: s => s.currentQ === 0 && s.correctTotal === 1 }
        ];

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            // Mồi âm thanh cho trình duyệt
            const snd = document.getElementById('achievement-sound');
            snd.play().then(() => { snd.pause(); snd.currentTime = 0; }).catch(() => {});
            loadQuestion();
        }

        function loadQuestion() {
            state.canAnswer = true; state.isDouble = false; state.isShield = false;
            const q = QUESTIONS[state.currentQ % QUESTIONS.length];
            document.getElementById('question-text').innerText = q.q;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "btn-option w-full p-4 rounded-2xl font-bold bg-white text-left border-2 border-slate-100 hover:border-blue-500 transition-all";
                btn.innerText = `${String.fromCharCode(65+i)}. ${opt}`;
                btn.onclick = () => checkAnswer(i);
                grid.appendChild(btn);
            });
            updateUI();
        }

        function checkAnswer(idx) {
            if (!state.canAnswer) return;
            state.canAnswer = false;
            const q = QUESTIONS[state.currentQ % QUESTIONS.length];
            const isCorrect = idx === q.correct;
            const fb = document.getElementById('feedback');
            fb.classList.remove('hidden');

            if (isCorrect) {
                state.correctTotal++;
                let pts = 10; if (state.isDouble) pts *= 2;
                state.score += pts; state.combo++;
                fb.innerText = `CHÍNH XÁC! +${pts}đ`;
                fb.style.background = "#10b981";
            } else {
                if (state.isShield) {
                    fb.innerText = "🛡️ KHIÊN ĐÃ ĐỠ ĐÒN!";
                    fb.style.background = "#3b82f6";
                } else {
                    state.score = Math.max(0, state.score - 5);
                    state.lastCombo = state.combo; state.combo = 0;
                    fb.innerText = `SAI RỒI!`;
                    fb.style.background = "#ef4444";
                }
            }
            updateUI();
            checkAch();
            setTimeout(() => { state.currentQ++; loadQuestion(); }, 1200);
        }

        function useBuff(type) {
            const price = BUFF_PRICES[type];
            if (!state.canAnswer || state.score < price) return;
            state.score -= price;
            
            if (type === 'skip') { state.currentQ++; loadQuestion(); }
            else if (type === 'double') state.isDouble = true;
            else if (type === 'shield') state.isShield = true;
            else if (type === 'restoreCombo') { state.combo = state.lastCombo; state.lastCombo = 0; }
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('total-score').innerText = state.score;
            const comboEl = document.getElementById('combo-display');
            if (state.combo >= 3) { comboEl.classList.remove('hidden'); comboEl.innerText = `🔥 x${state.combo}`; }
            else { comboEl.classList.add('hidden'); }

            // Cập nhật trạng thái Phát sáng cho Buff
            Object.keys(BUFF_PRICES).forEach(type => {
                const el = document.getElementById(`buff-${type}`);
                if (state.score >= BUFF_PRICES[type]) {
                    el.classList.add('available');
                } else {
                    el.classList.remove('available', 'active');
                }
                if ((type === 'double' && state.isDouble) || (type === 'shield' && state.isShield)) {
                    el.classList.add('active');
                }
            });
        }

        function checkAch() {
            ACHS.forEach(a => {
                if (!state.unlocked.has(a.id) && a.condition(state)) {
                    state.unlocked.add(a.id);
                    localStorage.setItem('tin9_final_ach', JSON.stringify([...state.unlocked]));
                    showToast(a);
                }
            });
        }

        function showToast(a) {
            const snd = document.getElementById('achievement-sound');
            if (snd) { snd.currentTime = 0; snd.play().catch(e => console.log("Lỗi âm thanh:", e)); }
            const t = document.getElementById('achievement-toast');
            document.getElementById('achievement-name').innerText = a.title;
            document.getElementById('toast-icon').innerText = a.icon;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        // Hiệu ứng hạt nền
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (state.combo >= 3) particles.push({ x: Math.random() * canvas.width, y: canvas.height, v: -Math.random()*3-1, a: 1 });
            particles.forEach((p, i) => {
                p.y += p.v; p.a -= 0.01;
                ctx.globalAlpha = p.a; ctx.fillStyle = '#3b82f6';
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if (p.a <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
